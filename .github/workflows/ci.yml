# M0 deliverable 9: backend lint+tests, frontend lint+tests, OpenAPI schema +
# TS client drift check, Playwright login smoke in en and ar (all against the
# mock adapters — no live credentials anywhere, CLAUDE.md rule 7).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: sehaerp
          POSTGRES_PASSWORD: sehaerp
          POSTGRES_DB: sehaerp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sehaerp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt
      - run: pip install -r requirements/dev.txt
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Tests
        run: pytest
      - name: Generate OpenAPI schema
        run: python manage.py spectacular --file schema.yml --validate
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: backend/schema.yml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  ts-client-drift:
    # The generated client is committed; regenerating from the current schema
    # must produce no diff (CLAUDE.md rule 10).
    needs: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: backend
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:api
      - name: Fail on drift between schema and committed client
        run: git diff --exit-code -- src/api/generated

  e2e:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: sehaerp
          POSTGRES_PASSWORD: sehaerp
          POSTGRES_DB: sehaerp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sehaerp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r requirements/dev.txt
        working-directory: backend
      - name: Migrate + seed demo data
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed_demo
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
      - name: Start backend
        working-directory: backend
        run: nohup python manage.py runserver 8000 > backend.log 2>&1 &
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Playwright smoke (en + ar)
        working-directory: frontend
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
