name: sehaerp-dev

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sehaerp
      POSTGRES_USER: sehaerp
      POSTGRES_PASSWORD: sehaerp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sehaerp -d sehaerp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      target: dev
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment: &backend-env
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: dev-only-insecure-key
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sehaerp
      POSTGRES_USER: sehaerp
      POSTGRES_PASSWORD: sehaerp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ../backend
      target: dev
    command: celery -A config worker -l info -Q default,integrations,notifications,reports
    environment: *backend-env
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      target: dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
